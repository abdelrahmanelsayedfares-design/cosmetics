name: cosmetics
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.1
  google_maps_flutter: ^2.13.1
  geolocator: ^14.0.2
  introduction_screen: ^4.0.0
  flutter_screenutil: ^5.9.3
  pin_code_fields: ^8.0.1
  animated_splash_screen: ^1.3.0
  lottie: ^2.3.0
dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/svg/
    - assets/looties/


  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/montserrat.ttf
